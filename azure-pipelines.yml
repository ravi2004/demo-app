# Node.js with React
# Build a Node.js project that uses React.
# Add steps that analyze code, save build artifacts, deploy, and more:
# https://docs.microsoft.com/azure/devops/pipelines/languages/javascript

trigger:
- main

pool:
  name: 'Azure Pipelines'

variables:
  # Define your resource names  
  azureSubscriptionConnection: 'AzureDevops-Connection'
  acrRegistryName: 'testacr1975.azurecr.io'
  imageRepository: 'demoapp'
  dockerfilePath: '$(Build.SourcesDirectory)/Dockerfile'
  tag: '$(Build.BuildId)'

stages:
  - stage: BuildAndPushStage
    displayName: "Build and Push Image"
    pool:
     name: 'Azure Pipelines'
    jobs:
      - job: BuildAndPushJob
        displayName: 'Build and Push Job'
        steps:
          - task: Docker@2
            displayName: 'Build and Push to ACR'
            inputs:
              containerRegistry: '$(azureSubscriptionConnection)'
              repository: '$(imageRepository)'
              command: 'buildAndPush'
              Dockerfile: '$(dockerfilePath)'
              tags: |
                $(tag)
                latest
  

